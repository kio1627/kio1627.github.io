<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛逼高速机场</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}
body{
  background:#121212;
  color:#fff;
  padding:20px;
  max-width:500px;
  margin:0 auto;
}
/* 网站标题 */
.site-title{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin:40px 0 30px;
  color:#fff;
}
.card{
  background:#1c1c1e;
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
}
.card h3{
  font-size:19px;
  margin-bottom:10px;
}
.card .tag{
  display:inline-block;
  background:#2a2a2c;
  padding:4px 10px;
  border-radius:12px;
  font-size:13px;
  margin-right:6px;
  margin-bottom:8px;
  color:#ddd;
}
.price{
  font-size:24px;
  font-weight:bold;
  color:#ff3b30;
  margin:12px 0;
}
.buy{
  background:#007aff;
  color:#fff;
  border:none;
  border-radius:14px;
  padding:15px;
  width:100%;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 主页顶部大标题：牛逼高速机场 -->
<div class="site-title">牛逼高速机场</div>

<div class="card">
  <h3>年度基础版</h3>
  <span class="tag">58元/年</span>
  <span class="tag">每月200G</span>
  <span class="tag">5台设备</span>
  <div class="price">¥58 / 年</div>
  <button class="buy" onclick="location.href='pay.html?amount=58'">立即购买</button>
</div>

<div class="card">
  <h3>年度标准版</h3>
  <span class="tag">128元/年</span>
  <span class="tag">每月1000G</span>
  <span class="tag">5台设备</span>
  <div class="price">¥128 / 年</div>
  <button class="buy" onclick="location.href='pay.html?amount=128'">立即购买</button>
</div>

<div class="card">
  <h3>年度旗舰版</h3>
  <span class="tag">188元/年</span>
  <span class="tag">每月3000G</span>
  <span class="tag">5台设备</span>
  <div class="price">¥188 / 年</div>
  <button class="buy" onclick="location.href='pay.html?amount=188'">立即购买</button>
</div>

<div class="card">
  <h3>永久入门版</h3>
  <span class="tag">42元永久</span>
  <span class="tag">总流量200G</span>
  <span class="tag">5台设备</span>
  <div class="price">¥42 永久</div>
  <button class="buy" onclick="location.href='pay.html?amount=42'">立即购买</button>
</div>

<div class="card">
  <h3>永久大容量版</h3>
  <span class="tag">98元永久</span>
  <span class="tag">总流量2TB</span>
  <span class="tag">5台设备</span>
  <div class="price">¥98 永久</div>
  <button class="buy" onclick="location.href='pay.html?amount=98'">立即购买</button>
</div>

</body>
</html>
