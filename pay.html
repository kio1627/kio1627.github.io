<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>

h1{font-size:36px;margin-bottom:30px}

.submit-btn{background:#007aff;color:#fff;border:none;border-radius:14px;padding:16px;width:100%;font-size:16px;font-weight:500}

.kefu{color:#aaa;font-size:14px;margin-top:20px;text-align:center;line-height:1.6}

</head>
<body>
<h1>确认支付</h1>
<div class="amount" id="amountText">金额：¥--</div>

<button class="btn alipay" id="alipayBtn">支付宝支付</button>

<div class="kefu">

客服邮箱：tt8450950@gmail.com

<script>

  return urlParams.get(name);
}
const amount = getParam('amount');
let alipayUrl = getParam('alipay');

// 固定 58 元套餐的新支付宝链接

document.getElementById('alipayBtn').onclick = () => window.open(alipayUrl);
