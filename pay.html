<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛逼高速机场 - 确认支付</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#000;color:#fff;padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.site-title{font-size:32px;margin-bottom:20px;font-weight:bold;text-align:center}
h1{font-size:28px;margin-bottom:30px}
.amount{font-size:28px;color:#ff3b30;margin-bottom:40px}
.btn{width:100%;max-width:400px;padding:18px;border:none;border-radius:14px;font-size:22px;font-weight:500;margin-bottom:16px;color:#fff}
.alipay{background:#007aff}
.usdt{background:#4a90e2}
.back{background:#333;color:#aaa;margin-top:20px}
.tip{color:#ccc;font-size:15px;margin-top:25px;text-align:center;line-height:1.6}
</style>
</head>

<body>
<div class="site-title">牛逼高速机场</div>
<h1>确认支付</h1>
<div class="amount" id="price">¥ 0.00</div>

<button class="btn alipay" id="alipayBtn">支付宝支付</button>
<button class="btn usdt" id="usdtBtn">USDT 支付</button>
<button class="btn back" onclick="history.back()">返回上一页</button>

<div class="tip">
支付没到账联系客服处理<br>
TG: kio_037
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const price = urlParams.get('price');
document.getElementById('price').innerText = '¥ ' + price + '.00';

// USDT 地址
document.getElementById('usdtBtn').onclick = function(){
  navigator.clipboard.writeText('TB6qQqtvmvBUb3GZot4Nt9x4gdiPbuAUXi');
  alert('USDT 地址已复制');
};

// 支付宝全部对应你给的链接
document.getElementById('alipayBtn').onclick = function(){
  switch(price){
    case '42':
      window.open('https://qr.alipay.com/2m616131bcknnzkddkskkd5','_blank'); break;
    case '68':
      window.open('https://qr.alipay.com/2m617728iqomyzupkxiqke5','_blank'); break;
    case '98':
      window.open('https://qr.alipay.com/2m618938m9ydqkhrsmlmqee','_blank'); break;
    case '128':
      window.open('https://qr.alipay.com/2m613355qwofxnkomwaqqf0','_blank'); break;
    case '188':
      window.open('https://qr.alipay.com/2m615093g3amu5rltcxn1e6','_blank'); break;
    case '288':
      window.open('https://qr.alipay.com/2m611308ww3ce4zwz5z7c0f','_blank'); break;
    default:
      alert('无效套餐');
  }
};
</script>
</body>
</html>
