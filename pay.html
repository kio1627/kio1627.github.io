<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛逼高速机场 - 确认支付</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#000;color:#fff;padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.site-title{font-size:32px;margin-bottom:20px;font-weight:bold;text-align:center}
h1{font-size:28px;margin-bottom:30px}
.amount{font-size:28px;color:#ff3b30;margin-bottom:40px}
.btn{width:100%;max-width:400px;padding:18px;border:none;border-radius:14px;font-size:22px;font-weight:500;margin-bottom:16px;color:#fff}
.alipay{background:#007aff}
.usdt{background:#4a90e2}
.back{background:#333;color:#aaa;margin-top:20px}
.tip{color:#ccc;font-size:15px;margin-top:25px;text-align:center;line-height:1.6}
</style>
</head>

<body>
<div class="site-title">牛逼高速机场</div>
<h1>确认支付</h1>
<div class="amount" id="price">¥ 0.00</div>

<button class="btn alipay" id="alipayBtn">支付宝支付</button>
<button class="btn usdt" id="usdtBtn">USDT 支付</button>
<button class="btn back" onclick="history.back()">返回上一页</button>

<div class="tip">
支付没到账联系客服处理<br>
TG: kio_037
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const price = urlParams.get('price');

const priceEl = document.getElementById('price');
const usdtAddr = 'TB6qQqtvmvBUb3GZot4Nt9x4gdiPbuAUXi';

// 显示对应金额
priceEl.textContent = '¥ ' + price + '.00';

// 支付宝统一用跳转（你可以后续自己分链接）
document.getElementById('alipayBtn').onclick = () => {
  if(price == 68) window.open('https://qr.alipay.com/2m617728iqomyzupkxiqke5','_blank');
  else if(price == 288) window.open('https://qr.alipay.com/2m611308ww3ce4zwz5z7c0f','_blank');
  else alert('请使用 USDT 支付或联系客服');
};

// USDT 统一复制地址
document.getElementById('usdtBtn').onclick = () => {
  navigator.clipboard.writeText(usdtAddr);
  alert('USDT 地址已复制');
};
</script>
</body>
</html>
