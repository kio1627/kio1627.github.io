<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛逼高速机场 - 确认支付</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#000;color:#fff;padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.site-title{font-size:32px;margin-bottom:20px;font-weight:bold;text-align:center}
h1{font-size:28px;margin-bottom:30px}
.amount{font-size:28px;color:#ff3b30;margin-bottom:25px}
.input-box{width:100%;max-width:400px;margin-bottom:20px}
input[type="email"]{width:100%;padding:16px;border-radius:14px;border:1px solid #444;background:#111;color:#fff;font-size:16px;outline:none}
input::placeholder{color:#888}
.btn{width:100%;max-width:400px;padding:18px;border:none;border-radius:14px;font-size:22px;font-weight:500;margin-bottom:16px;color:#fff;cursor:pointer}
.alipay{background:#007aff}
.usdt{background:#4a90e2}
.back{background:#333;color:#aaa;margin-top:20px}
.tip{color:#ccc;font-size:15px;margin-top:25px;text-align:center;line-height:1.6}
</style>
</head>

<body>
<div class="site-title">牛逼高速机场</div>
<h1>确认支付</h1>
<div class="amount"></div>

<div class="input-box">
<input type="email" placeholder="填写接收凭证邮箱" required>
</div>

<button class="btn alipay">支付宝支付</button>
<button class="btn usdt">USDT 支付</button>
<button class="btn back">返回上一页</button>

<div class="tip">
支付完成后系统将自动开通套餐<br>
如遇未到账请联系客服处理
</div>
</body>
</html>
