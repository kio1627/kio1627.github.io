<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛逼高速机场 - 确认支付</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#000;color:#fff;padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.site-title{font-size:32px;margin-bottom:20px;font-weight:bold;text-align:center}
h1{font-size:28px;margin-bottom:30px}
.amount{font-size:28px;color:#ff3b30;margin-bottom:40px}
.btn{width:100%;max-width:400px;padding:18px;border:none;border-radius:14px;font-size:22px;font-weight:500;margin-bottom:16px;color:#fff}
.alipay{background:#007aff}
.wechat{background:#34c758}
.usdt{background:#4a90e2}
.mailbtn{background:#ff9500;margin-top:10px}
.back{background:#333;color:#aaa;margin-top:20px}
.kefu{color:#aaa;font-size:14px;margin-top:30px;text-align:center;line-height:1.6}
</style>
</head>

<body>
<div class="site-title">牛逼高速机场</div>
<h1>确认支付</h1>
<div class="amount" id="amountText">金额：¥--</div>

<button class="btn alipay" id="alipayBtn">支付宝支付</button>
<button class="btn wechat">微信支付</button>
<button class="btn usdt" id="usdtBtn">USDT 支付</button>

<a id="mailLink" class="btn mailbtn" style="text-decoration:none;text-align:center">
发送订单信息给客服
</a>

<button class="btn back" onclick="history.back()">返回套餐页</button>

<div class="kefu">
TG客服 @kio_037<br>
QQ客服 2245190858
</div>

<script>
function getParam(name){
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}
const amount = getParam('amount');

// 支付宝（58元专用）
let alipayUrl = '';
if (amount === '58') {
  alipayUrl = 'https://qr.alipay.com/2m618367pz0nzbfhjptoef2';
} else {
  alipayUrl = 'https://qr.alipay.com/';
}
document.getElementById('alipayBtn').onclick = () => window.open(alipayUrl);

// USDT TRC20 地址（你提供的）
document.getElementById('usdtBtn').onclick = () => {
  alert(`USDT TRC20 地址：
TB6qQqtvmvBUb3GZot4Nt9x4gdiPbuAUXi

转账后请点击【发送订单信息】联系客服开通`);
};

// 发送订单邮件给你
const mailTo = "tt8450950@gmail.com";
const subject = "用户购买套餐通知";
const body = `我已购买套餐：
金额：${amount} 元
请客服开通账号`;

document.getElementById("mailLink").href = 
`mailto:${mailTo}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

document.getElementById('amountText').textContent = '金额：¥' + amount;
</script>
</body>
</html>
